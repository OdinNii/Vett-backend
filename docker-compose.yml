version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: vett
      POSTGRES_PASSWORD: vett
      POSTGRES_DB: vett
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vett"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://vett:vett@db:5432/vett
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app   # hot-reload in dev

volumes:
  postgres_data:
